<div class="fixed inset-0 z-50 grid place-items-center bg-ink/45 px-4 py-6" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
  <button class="absolute inset-0 cursor-default" type="button" aria-label="Close modal" onclick="closeTaskModal()"></button>

  <section class="relative w-full max-w-xl rounded-lg border border-clay-100 bg-white p-6 shadow-soft sm:p-8">
    <button class="absolute right-4 top-4 rounded-lg px-3 py-2 text-sm font-bold text-stone transition hover:bg-paper hover:text-ink" type="button" onclick="closeTaskModal()">Close</button>

    <p class="mb-3 text-xs font-extrabold uppercase tracking-[0.18em] text-clay-700">Delete record</p>
    <h2 id="delete-modal-title" class="font-serif text-4xl font-bold leading-tight tracking-tight text-ink">Delete "{{ task.title }}"?</h2>
    <p class="mt-4 leading-7 text-stone">This removes the task from Postgres and refreshes the task list.</p>

    <form
      method="post"
      action="{{ request.path }}"
      class="mt-8 flex flex-wrap gap-3"
      hx-post="{{ request.path }}"
      hx-target="#modal-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}
      <button class="inline-flex items-center justify-center rounded-lg bg-clay-700 px-5 py-3 text-sm font-bold text-white shadow-sm transition hover:bg-clay-800 focus:outline-none focus:ring-4 focus:ring-clay-100" type="submit">Delete task</button>
      <button class="inline-flex items-center justify-center rounded-lg border border-mist bg-white px-5 py-3 text-sm font-bold text-ink transition hover:bg-paper focus:outline-none focus:ring-4 focus:ring-forest-100" type="button" onclick="closeTaskModal()">Cancel</button>
    </form>
  </section>
</div>
