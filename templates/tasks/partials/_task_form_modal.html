<div class="fixed inset-0 z-50 grid place-items-center bg-ink/45 px-4 py-6" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
  <button class="absolute inset-0 cursor-default" type="button" aria-label="Close modal" onclick="closeTaskModal()"></button>

  <section class="relative max-h-[90vh] w-full max-w-2xl overflow-y-auto rounded-lg border border-mist bg-white p-6 shadow-soft sm:p-8">
    <button class="absolute right-4 top-4 rounded-lg px-3 py-2 text-sm font-bold text-stone transition hover:bg-paper hover:text-ink" type="button" onclick="closeTaskModal()">Close</button>

    <p class="mb-3 text-xs font-extrabold uppercase tracking-[0.18em] text-forest-600">{{ form_eyebrow }}</p>
    <h2 id="task-modal-title" class="font-display text-4xl font-bold leading-tight tracking-tight text-ink">{{ form_title }}</h2>

    <form
      method="post"
      action="{{ request.path }}"
      class="mt-8 grid gap-5"
      hx-post="{{ request.path }}"
      hx-target="#modal-root"
      hx-swap="innerHTML"
    >
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="rounded-lg bg-clay-100 p-4 text-sm font-semibold text-clay-800">
          {{ form.non_field_errors }}
        </div>
      {% endif %}

      {% for field in form %}
        <div>
          <label class="text-sm font-extrabold text-ink" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.help_text %}
            <p class="mt-2 text-sm text-stone">{{ field.help_text }}</p>
          {% endif %}
          {% for error in field.errors %}
            <p class="mt-2 text-sm font-semibold text-clay-800">{{ error }}</p>
          {% endfor %}
        </div>
      {% endfor %}

      <div class="flex flex-wrap gap-3 pt-2">
        <button class="inline-flex items-center justify-center rounded-lg bg-forest-600 px-5 py-3 text-sm font-bold text-white shadow-sm transition hover:bg-forest-700 focus:outline-none focus:ring-4 focus:ring-forest-100" type="submit">{{ submit_label }}</button>
        <button class="inline-flex items-center justify-center rounded-lg border border-mist bg-white px-5 py-3 text-sm font-bold text-ink transition hover:bg-paper focus:outline-none focus:ring-4 focus:ring-forest-100" type="button" onclick="closeTaskModal()">Cancel</button>
      </div>
    </form>
  </section>
</div>
